<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champ Code Academy · Student Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #f7fbfd;
    font-family: 'Nunito', -apple-system, system-ui, sans-serif;
    color: #1a2942;
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }

  /* Card hover */
  .pc-card[onclick], .pc-card[role="button"] { cursor: pointer; }
  .pc-card:hover { box-shadow: 0 2px 0 rgba(15,38,73,0.04), 0 12px 28px -12px rgba(15,38,73,0.14) !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d6e6f0; border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: #a3b5c8; }

  /* Animations */
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Page transition */
  .page-fade { animation: fadeIn .25s ease-out; }

  /* Loading shimmer */
  .shimmer {
    background: linear-gradient(90deg, #eef3f8 0%, #f7fbfd 50%, #eef3f8 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
</style>
</head>
<body style="background-color: rgb(32, 36, 38)">
<div id="root"></div>

<script type="text/babel" src="portal-shared.jsx"></script>
<script type="text/babel" src="portal-dashboard.jsx"></script>
<script type="text/babel" src="portal-builder-chrome.jsx"></script>
<script type="text/babel" src="portal-builder.jsx"></script>
<script type="text/babel" src="portal-pages.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const App = () => {
  const [page, setPage] = useState('home');
  const [user, setUser] = useState(DEFAULT_USER);

  // Persist avatar choice across sessions
  useEffect(() => {
    try {
      const saved = localStorage.getItem('champ_user');
      if (saved) setUser(u => ({ ...u, ...JSON.parse(saved) }));
    } catch {}
  }, []);
  useEffect(() => {
    try { localStorage.setItem('champ_user', JSON.stringify({ avatar: user.avatar, name: user.name })); } catch {}
  }, [user.avatar, user.name]);

  const renderPage = () => {
    switch (page) {
      case 'home': return <DashboardPage user={user} setPage={setPage} />;
      case 'quests': return <QuestsPage user={user} setPage={setPage} />;
      case 'builder': return <BuilderPage user={user} />;
      case 'badges': return <BadgesPage user={user} />;
      case 'community': return <CommunityPage user={user} setPage={setPage} />;
      case 'profile': return <ProfilePage user={user} setUser={setUser} />;
      default: return <DashboardPage user={user} setPage={setPage} />;
    }
  };

  return (
    <div data-screen-label={`Student Portal · ${page}`} style={{
      display: 'flex', minHeight: '100vh', background: '#f7fbfd',
    }}>
      <Sidebar page={page} setPage={setPage} user={user} />
      <main style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
        <Topbar user={user} setPage={setPage} />
        <div key={page} className="page-fade" style={{ flex: 1, padding: '28px 32px 60px' }}>
          {renderPage()}
        </div>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
