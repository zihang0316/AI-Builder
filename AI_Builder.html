const Btn = ({ children, color = 'var(--color-accent-1)', variant = 'solid', size = 'md', onClick, icon, iconRight, style = {}, disabled, title }) => {
  const pad = size === 'sm' ? '8px 14px' : size === 'lg' ? '14px 22px' : '11px 18px';
  const fs = size === 'sm' ? 13 : size === 'lg' ? 16 : 14;
  let bg = color, fg = '#fff', bd = `2px solid ${color}`;
  if (variant === 'ghost') { bg = 'transparent'; fg = color; bd = '2px solid transparent'; }
  if (variant === 'outline') { bg = '#fff'; fg = color; }
  if (variant === 'soft') { bg = `color-mix(in srgb, ${color} 14%, transparent)`; fg = color; bd = '2px solid transparent'; }
  return (
    <button onClick={onClick} disabled={disabled} title={title} style={{
      display: 'inline-flex', alignItems: 'center', gap: 8, justifyContent: 'center',
      padding: pad, fontSize: fs, fontWeight: 700,
      fontFamily: 'var(--font-display)',
      borderRadius: 'var(--r-pill)', border: bd, background: bg, color: fg,
      cursor: disabled ? 'not-allowed' : 'pointer',
      opacity: disabled ? 0.55 : 1,
      boxShadow: variant === 'solid' ? `0 4px 0 color-mix(in srgb, ${color} 35%, transparent)` : 'none',
      transition: 'transform .1s, box-shadow .1s',
      whiteSpace: 'nowrap',
      ...style,
    }}
    onMouseDown={e=>{ if(!disabled && variant==='solid') e.currentTarget.style.transform='translateY(2px)'; }}
    onMouseUp={e=>{ e.currentTarget.style.transform='translateY(0)'; }}
    onMouseLeave={e=>{ e.currentTarget.style.transform='translateY(0)'; }}

      {children}

const SYSTEM_PROMPT = `You are a game generator for Champ Code Academy, a coding platform for kids aged 7-15. Your job is to take a child's description and generate a complete, self-contained, playable HTML5 game.

OUTPUT RULES (strict):
- Return ONLY a single complete HTML document, starting with <!DOCTYPE html>.
- No explanation, no markdown code fences, no commentary before or after the HTML.
- All CSS and JavaScript must be inline.
- Must fit and play well in a 640x480 iframe — size your canvas, layout, and font sizes accordingly.

DESIGN RULES:
- Use these brand colors where appropriate: #3DB896 (mint green), #ED7559 (coral), #957FE8 (soft purple), #EAF5FC (light blue background), #FDF7E3 (warm cream).
- Use rounded corners (border-radius: 12px or more) everywhere.
- Bright, friendly, kid-appropriate visual style. No dark/scary themes unless explicitly asked.
- Use 'Nunito', 'Fredoka' or system-ui font families. A Google Fonts link is fine.
- Title at the top, the game area, and a clear score/state display.

GAMEPLAY RULES:
- The game must work immediately on load — no setup or start screen unless absolutely necessary.
- Include keyboard AND mouse/touch controls where it makes sense.
- Always provide a way to restart after game over (button or key).
- Code should be solid: test it mentally before outputting, fix obvious bugs, handle edge cases (player going off-screen, etc).
- Keep it simple, fun, and immediately playable.`;

/* ─────────────────────────────────────────────────────────
   AI CALL — Anthropic API via artifact env
   ───────────────────────────────────────────────────────── */
async function callClaude(userPrompt) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: [{ role: "user", content: userPrompt }],
    }),
  });
  if (!response.ok) {
    const txt = await response.text().catch(() => '');
    throw new Error(`API error ${response.status}: ${txt.slice(0, 200)}`);
  }
  const data = await response.json();
  const textBlock = (data.content || []).find(b => b.type === 'text');
  if (!textBlock) throw new Error('No response from AI. Try again!');
  return textBlock.text;
}

function extractHtml(raw) {
  let html = raw.trim();
  if (html.startsWith('```')) {
    html = html.replace(/^```[a-zA-Z]*\n?/, '').replace(/```\s*$/, '');
  }
  const match = html.match(/<!DOCTYPE[\s\S]*<\/html>/i) || html.match(/<html[\s\S]*<\/html>/i);
  if (match) html = match[0];
  return html.trim();
}

const GuidedBuilder = ({ onComplete, onCancel }) => {
  const [step, setStep] = useState(0);
  const [picks, setPicks] = useState({});

  const pick = (opt) => {
    const next = { ...picks, [GUIDED_STEPS[step].key]: opt };
    setPicks(next);
    if (step < GUIDED_STEPS.length - 1) {
      setTimeout(() => setStep(step + 1), 250);
    } else {
      // Compose prompt
      const composed = `I want ${next.kind.text}, ${next.controls.text}. ${next.goal.text.charAt(0).toUpperCase() + next.goal.text.slice(1)}. Build it ${next.theme.text}.`;
      onComplete(composed);
    }
  };

  const current = GUIDED_STEPS[step];
  const progress = ((step) / GUIDED_STEPS.length) * 100;

  return (
    <div style={{
      animation: 'fadeIn .25s ease-out',
    }}>
      {/* Progress dots */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 18 }}>
        {GUIDED_STEPS.map((_, i) => (
          <div key={i} style={{
            flex: 1, height: 6, borderRadius: 99,
            background: i <= step ? 'var(--color-accent-3)' : 'var(--n-50)',
            transition: 'background .3s',
          }} />
        ))}
        <button onClick={onCancel} style={{
          fontFamily: 'var(--font-code)', fontSize: 11, color: 'var(--n-400)',
          background: 'transparent', border: 'none', fontWeight: 700, cursor: 'pointer',
          letterSpacing: 0.5, marginLeft: 4,
        }}>SKIP</button>
      </div>

      <div key={step} style={{ animation: 'pop .3s cubic-bezier(.22,.61,.36,1)' }}>
        <p style={{ fontFamily: 'var(--font-code)', fontSize: 11, color: 'var(--n-400)', fontWeight: 700, letterSpacing: 1.5, marginBottom: 6 }}>
          STEP {step + 1} / {GUIDED_STEPS.length}
        </p>
        <h3 style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 600, color: 'var(--n-900)', marginBottom: 16, letterSpacing: -0.3 }}>
          {current.q}
        </h3>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          {current.options.map(opt => {
            const isPicked = picks[current.key]?.id === opt.id;
            return (
              <button key={opt.id} onClick={() => pick(opt)} style={{
                display: 'flex', alignItems: 'center', gap: 12,
                padding: 14, borderRadius: 'var(--r-md)',
                background: isPicked ? 'color-mix(in srgb, var(--color-accent-3) 12%, white)' : 'var(--n-50)',
                border: isPicked ? '2px solid var(--color-accent-3)' : '2px solid var(--border)',
                cursor: 'pointer', textAlign: 'left',
                transition: 'all .15s',
              }}
              onMouseEnter={e => { if (!isPicked) { e.currentTarget.style.borderColor = 'var(--color-accent-3)'; e.currentTarget.style.background = '#fff'; } }}
              onMouseLeave={e => { if (!isPicked) { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'var(--n-50)'; } }}
              >
                <span style={{ fontSize: 24, lineHeight: 1 }}>{opt.emoji}</span>
                <span style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 14, color: 'var(--n-900)' }}>{opt.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
};

      animation: 'float-up 4s ease-in-out infinite',
    }}>🎮</div>
    <div>
      <h3 style={{ fontFamily: 'var(--font-display)', fontSize: 24, fontWeight: 600, color: 'var(--n-900)', marginBottom: 8, letterSpacing: -0.3 }}>
        Your game will appear here
      </h3>
      <p style={{ fontSize: 14, color: 'var(--n-600)', maxWidth: 360, lineHeight: 1.55, margin: '0 auto' }}>
        Type an idea on the left, pick a starter, or try the step-by-step builder.
      </p>
    </div>
    <div style={{ display: 'flex', gap: 16, marginTop: 6, fontSize: 12, color: 'var(--n-400)', fontFamily: 'var(--font-code)', fontWeight: 600 }}>
      <span>⌨ Keyboard</span>
      <span>🖱 Mouse</span>
      <span>📱 Touch</span>
    </div>
  </div>
);

/* ─────────────────────────────────────────────────────────
   ACTION BAR (below preview when a game is loaded)
   ───────────────────────────────────────────────────────── */
const ActionBar = ({ game, isSaved, onSave, onRemixCustom, onDownload, onShare, onRemixWith }) => (
  <Card style={{ padding: 18 }}>
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, minWidth: 0, flex: 1 }}>
        <Pill color="var(--color-accent-1)" filled size="sm">+50 XP</Pill>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, color: 'var(--n-900)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{game.title}</div>
          <div style={{ fontSize: 12, color: 'var(--n-400)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 480 }}>
            {game.prompt}
          </div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
        <Btn color="var(--n-600)" variant="outline" icon="share" size="sm" onClick={onShare}>Share</Btn>
        <Btn color="var(--color-accent-3)" variant="outline" icon="download" size="sm" onClick={onDownload}>Download</Btn>
        <Btn color={isSaved ? 'var(--color-accent-1)' : 'var(--color-accent-2)'} icon={isSaved ? 'check' : 'heart'} size="sm" onClick={onSave} disabled={isSaved}>
          {isSaved ? 'Saved!' : 'Save game'}
        </Btn>
      </div>
    </div>

    {/* Quick remix chips */}
    <div style={{ marginTop: 16, paddingTop: 16, borderTop: '1px dashed var(--border)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
        <Icon name="refresh" size={14} stroke="var(--n-400)" />
        <span style={{ fontFamily: 'var(--font-code)', fontSize: 11, color: 'var(--n-400)', fontWeight: 700, letterSpacing: 1 }}>QUICK REMIX</span>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {REMIX_CHIPS.map(c => (
          <button key={c.id} onClick={() => onRemixWith(c)} style={{
            padding: '6px 12px', borderRadius: 'var(--r-pill)',
            background: 'var(--n-50)', border: '1.5px solid var(--border)',
            fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 12, color: 'var(--n-800)',
            cursor: 'pointer', transition: 'all .12s',
          }}
          onMouseEnter={e => { e.currentTarget.style.background = '#F0EEFF'; e.currentTarget.style.borderColor = 'var(--color-accent-3)'; e.currentTarget.style.color = 'var(--color-accent-3)'; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'var(--n-50)'; e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--n-800)'; }}
          >
            {c.label}
          </button>
        ))}
        <button onClick={onRemixCustom} style={{
          padding: '6px 12px', borderRadius: 'var(--r-pill)',
          background: '#fff', border: '1.5px solid var(--color-accent-3)',
          fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 12, color: 'var(--color-accent-3)',
          cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 5,
        }}>
          <Icon name="edit" size={12} /> Custom remix
        </button>
      </div>
    </div>
  </Card>
);

/* ─────────────────────────────────────────────────────────
   SAVED GAMES GALLERY
   ───────────────────────────────────────────────────────── */
const SavedGames = ({ savedGames, onLoad, onDelete, onDownload }) => {
  if (savedGames.length === 0) {
    return (
      <Card style={{ padding: 36, textAlign: 'center', background: 'var(--n-50)' }}>
        <div style={{ fontSize: 42, marginBottom: 10 }}>🎮</div>
        <h3 style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 600, color: 'var(--n-900)', marginBottom: 4 }}>No saved games yet</h3>
        <p style={{ fontSize: 13, color: 'var(--n-600)' }}>Build a game above and hit Save — it'll appear here so you can come back and play.</p>
      </Card>
    );
  }
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
      {savedGames.map(g => (
        <Card key={g.id} style={{ padding: 0, overflow: 'hidden' }}>
          <div style={{
            height: 140, background: 'linear-gradient(135deg, var(--color-primary), var(--color-secondary))',
            display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative',
            borderBottom: '1px solid var(--border)',
          }}>
            <iframe
              srcDoc={g.html}
              sandbox=""
              style={{
                width: 320, height: 240, border: 'none', pointerEvents: 'none',
                transform: 'scale(0.42)', transformOrigin: 'center', background: '#fff',
                borderRadius: 8, boxShadow: '0 4px 12px rgba(15,38,73,0.12)',
              }}
            />
            <Pill color="var(--color-accent-3)" filled size="sm" style={{ position: 'absolute', top: 10, left: 10, padding: '2px 8px' }}>
              <Icon name="sparkles" size={10} stroke="#fff" /> AI
            </Pill>
          </div>
          <div style={{ padding: 14 }}>
            <h4 title={g.title} style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, color: 'var(--n-900)', marginBottom: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
              {g.title}
            </h4>
            <p style={{ fontSize: 11, color: 'var(--n-200)', marginBottom: 12, fontFamily: 'var(--font-code)', fontWeight: 600 }}>
              {new Date(g.createdAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })} · {g.html.length.toLocaleString()} bytes
            </p>
            <div style={{ display: 'flex', gap: 6 }}>
              <Btn color="var(--color-accent-1)" size="sm" icon="play" onClick={() => onLoad(g)} style={{ flex: 1 }}>Play</Btn>
              <button onClick={() => onDownload(g)} title="Download" style={{
                width: 32, height: 32, borderRadius: 'var(--r-pill)', border: '2px solid var(--border)',
                background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                cursor: 'pointer', color: 'var(--n-400)',
              }}>
                <Icon name="download" size={14} />
              </button>
              <button onClick={() => onDelete(g.id)} title="Delete" style={{
                width: 32, height: 32, borderRadius: 'var(--r-pill)', border: '2px solid var(--border)',
                background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                cursor: 'pointer', color: 'var(--n-400)',
              }}>
                <Icon name="trash" size={14} />
              </button>
            </div>
          </div>
        </Card>
      ))}
    </div>
  );
};

/* ─────────────────────────────────────────────────────────
   FULLSCREEN PLAY OVERLAY
   ───────────────────────────────────────────────────────── */
const FullscreenPlay = ({ game, onClose }) => (
  <div style={{
    position: 'fixed', inset: 0, zIndex: 100,
    background: 'rgba(13,31,42,0.92)',
    display: 'flex', flexDirection: 'column',
    padding: 28, animation: 'fadeIn .2s',
  }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, color: '#fff' }}>
      <Icon name="sparkles" size={18} stroke="#fff" />
      <span style={{ fontFamily: 'var(--font-display)', fontSize: 17, fontWeight: 600 }}>{game.title}</span>
      <Pill color="var(--color-accent-1)" filled size="sm">PLAYING</Pill>
      <div style={{ flex: 1 }} />
      <button onClick={onClose} style={{
        padding: '10px 18px', borderRadius: 'var(--r-pill)',
        background: 'rgba(255,255,255,0.12)', border: '1.5px solid rgba(255,255,255,0.2)',
        color: '#fff', fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 14,
        cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 6,
      }}>
        <Icon name="arrowLeft" size={14} stroke="#fff" /> Back
      </button>
    </div>
    <iframe
      srcDoc={game.html}
      title={game.title}
      sandbox="allow-scripts allow-same-origin"
      style={{
        flex: 1, width: '100%', border: 'none',
        background: '#fff', borderRadius: 'var(--r-lg)',
        boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
      }}
    />
  </div>
);

/* ─────────────────────────────────────────────────────────
   MAIN APP
   ───────────────────────────────────────────────────────── */
const App = () => {
  const [prompt, setPrompt] = useState('');
  const [game, setGame] = useState(null);     // { id, title, prompt, html, createdAt }
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [savedGames, setSavedGames] = useState([]);
  const [showCode, setShowCode] = useState(false);
  const [mode, setMode] = useState('free');
  const [fullscreen, setFullscreen] = useState(false);
  const iframeRef = useRef(null);

  // A whimsical, locally-generated "games built today" counter — feels alive without a backend.
  const gamesBuiltToday = useMemo(() => {
    const seed = new Date().toDateString();
    let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) & 0xffff;
    return 1200 + (h % 800);
  }, []);

  // Load saved
  useEffect(() => {
    try {
      const raw = localStorage.getItem('champ_saved_games');
      if (raw) setSavedGames(JSON.parse(raw));
    } catch {}
  }, []);

  const persistSaved = (next) => {
    setSavedGames(next);
    try { localStorage.setItem('champ_saved_games', JSON.stringify(next)); } catch {}
  };

  const generate = useCallback(async (text) => {
    const p = (text || prompt).trim();
    if (!p) return;
    setLoading(true);
    setError(null);
    setShowCode(false);
    setGame(null);
    try {
      const raw = await callClaude(p);
      const html = extractHtml(raw);
      if (!html || html.length < 100) throw new Error('The AI gave a strange response. Try again or rephrase your idea.');
      const title = p.length > 44 ? p.slice(0, 44) + '…' : p;
      setGame({ id: Date.now(), title, prompt: p, html, createdAt: Date.now() });
      // Scroll preview into view on mobile
      requestAnimationFrame(() => {
        document.getElementById('preview-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    } catch (e) {
      setError(e.message || 'Something went wrong. Try again!');
    } finally {
      setLoading(false);
    }
  }, [prompt]);

  const onPickSuggestion = (s) => {
    setPrompt(s.prompt);
  };

  const onPickStarterFromHero = (s) => {
    setPrompt(s.prompt);
    generate(s.prompt);
  };

  const save = () => {
    if (!game) return;
    const next = [game, ...savedGames.filter(g => g.id !== game.id)].slice(0, 12);
    persistSaved(next);
  };

  const deleteSaved = (id) => {
    if (!window.confirm('Delete this saved game?')) return;
    persistSaved(savedGames.filter(g => g.id !== id));
  };

  const loadSaved = (g) => {
    setGame(g);
    setPrompt(g.prompt);
    setShowCode(false);
    requestAnimationFrame(() => {
      document.getElementById('preview-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  };

  const refreshIframe = () => {
    if (iframeRef.current && game) {
      const src = game.html;
      iframeRef.current.srcdoc = '';
      requestAnimationFrame(() => { iframeRef.current.srcdoc = src; });
    }
  };

  const downloadGame = (g = game) => {
    if (!g) return;
    const blob = new Blob([g.html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safe = g.title.replace(/[^a-z0-9]+/gi, '-').replace(/^-|-$/g, '').toLowerCase() || 'champ-game';
    a.href = url;
    a.download = `${safe}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const shareGame = async () => {
    if (!game) return;
    const text = `Check out the game I built: "${game.title}"`;
    if (navigator.share) {
      try { await navigator.share({ title: game.title, text }); return; } catch {}
    }
    try {
      await navigator.clipboard.writeText(game.prompt);
      alert('Game prompt copied to clipboard! Paste it to share with a friend.');
    } catch {
      alert(`Share this prompt with your friend:\n\n${game.prompt}`);
    }
  };

  const remixWith = (chip) => {
    if (!game) return;
    const remixedPrompt = `${game.prompt}\n\nAdditionally: ${chip.modifier}`;
    setPrompt(remixedPrompt);
    generate(remixedPrompt);
  };

  const isSaved = game && savedGames.some(g => g.id === game.id);

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Header savedCount={savedGames.length} gamesBuiltToday={gamesBuiltToday} />

      {/* Hero only shows when no game and not loading */}
      {!game && !loading && !error && <Hero onPickStarter={onPickStarterFromHero} />}

      {/* Main builder */}
      <main style={{ flex: 1, maxWidth: 1200, width: '100%', margin: '0 auto', padding: '32px 32px 60px' }}>
        <div id="preview-anchor" />
        <div style={{ display: 'grid', gridTemplateColumns: '420px 1fr', gap: 24, marginBottom: 24 }}>
          {/* LEFT */}
          <PromptPanel
            prompt={prompt}
            setPrompt={setPrompt}
            generate={generate}
            loading={loading}
            mode={mode}
            setMode={setMode}
            onPickSuggestion={onPickSuggestion}
          />

          {/* RIGHT */}
          <Preview
            game={game}
            loading={loading}
            error={error}
            showCode={showCode}
            setShowCode={setShowCode}
            onRetry={() => generate()}
            iframeRef={iframeRef}
            onRefresh={refreshIframe}
            onFullscreen={() => setFullscreen(true)}
          />
        </div>

        {/* Action bar (when game generated) */}
        {game && !loading && (
          <div style={{ marginBottom: 32 }}>
            <ActionBar
              game={game}
              isSaved={isSaved}
              onSave={save}
              onRemixCustom={() => { document.querySelector('textarea')?.focus(); }}
              onDownload={() => downloadGame(game)}
              onShare={shareGame}
              onRemixWith={remixWith}
            />
          </div>
        )}

        {/* Saved games */}
        <div>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 14 }}>
            <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 600, color: 'var(--n-900)', letterSpacing: -0.3 }}>
              🎮 My Saved Games
              {savedGames.length > 0 && <span style={{ marginLeft: 8, fontFamily: 'var(--font-code)', fontSize: 13, color: 'var(--n-400)', fontWeight: 600 }}>· {savedGames.length}</span>}
            </h2>
            {savedGames.length > 0 && (
              <span style={{ fontFamily: 'var(--font-code)', fontSize: 11, color: 'var(--n-200)', fontWeight: 700, letterSpacing: 1 }}>
                STORED LOCALLY · MAX 12
              </span>
            )}
          </div>
          <SavedGames savedGames={savedGames} onLoad={loadSaved} onDelete={deleteSaved} onDownload={downloadGame} />
        </div>

        {/* Footer */}
        <footer style={{
          marginTop: 60, paddingTop: 24, borderTop: '1px dashed var(--border)',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap',
          fontSize: 12, color: 'var(--n-400)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: 'var(--font-code)', fontWeight: 600 }}>
            <Icon name="sparkles" size={12} stroke="var(--color-accent-3)" />
            <span>Champ Code Academy · AI Game Builder v1.0</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16, fontFamily: 'var(--font-code)', fontWeight: 600 }}>
            <span>Made for ages 7–15</span>
            <span>·</span>
            <span>Stay kind, stay curious 💚</span>
          </div>
        </footer>
      </main>

      {fullscreen && game && (
        <FullscreenPlay game={game} onClose={() => setFullscreen(false)} />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
